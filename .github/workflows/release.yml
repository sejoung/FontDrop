name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build + publish APK
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon --stacktrace

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Stage release asset
        id: stage
        run: |
          mkdir -p release-staging
          src="app/build/outputs/apk/debug/app-debug.apk"
          dest="release-staging/fontdrop-${{ steps.tag.outputs.name }}-debug.apk"
          cp "$src" "$dest"
          echo "apk=$dest" >> "$GITHUB_OUTPUT"

      - name: Detect prerelease tag
        id: prerelease
        run: |
          tag="${{ steps.tag.outputs.name }}"
          if [[ "$tag" =~ (alpha|beta|rc|dev|preview) ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: FontDrop ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.value }}
          files: ${{ steps.stage.outputs.apk }}
          body: |
            Debug-signed APK for manual install and testing. Not a Play Store release —
            install requires "Unknown sources" permission on the device.

            Production signing (release keystore via Actions secrets) is pending.
